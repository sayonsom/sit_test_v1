events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    server_tokens off;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;

    server {
        listen 80;
        server_name localhost;
        root /usr/share/nginx/html;
        index index.html;

        include /etc/nginx/snippets/security-headers.conf;

        # Runtime env config should never be cached
        location = /env-config.js {
            include /etc/nginx/snippets/security-headers.conf;
            expires -1;
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        }

        location = /manifest.json {
            include /etc/nginx/snippets/security-headers.conf;
            add_header Cache-Control "no-store" always;
        }

        # LTI backend endpoints are injected at container start.
        include /etc/nginx/conf.d/lti-proxy.conf;

        # Main backend API - proxy through same origin to avoid CORS
        # Upstream is injected at container start by docker-entrypoint.sh
        include /etc/nginx/conf.d/backend-proxy.conf;

        include /etc/nginx/conf.d/lti-debug-routes.conf;

        # Draco decoder assets for compressed glTF/GLB models.
        # Keep these under /assets to avoid deployment proxies that block /draco.
        location ^~ /assets/draco/ {
            include /etc/nginx/snippets/security-headers.conf;
            alias /usr/share/nginx/html/draco/;
            expires 1y;
            add_header Cache-Control "public, immutable" always;
        }

        # Handle client-side routing (React Router)
        location / {
            include /etc/nginx/snippets/security-headers.conf;
            add_header Cache-Control "no-store" always;
            try_files $uri $uri/ /index.html;
        }

        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|json|wasm|glb|gltf)$ {
            include /etc/nginx/snippets/security-headers.conf;
            expires 1y;
            add_header Cache-Control "public, immutable" always;
        }

        # Do not publish production source maps.
        location ~* \.map$ {
            include /etc/nginx/snippets/security-headers.conf;
            add_header Cache-Control "no-store" always;
            return 404;
        }

        # Do not cache HTML entrypoints or authenticated SPA routes.
        location ~* \.(html)$ {
            include /etc/nginx/snippets/security-headers.conf;
            expires -1;
            add_header Cache-Control "no-store" always;
        }

        # Health check endpoint
        location /health {
            include /etc/nginx/snippets/security-headers.conf;
            access_log off;
            default_type text/plain;
            add_header Cache-Control "no-store" always;
            return 200 "healthy\n";
        }
    }
}
