name: Security Gates

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  frontend:
    name: Frontend audit and build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm audit --omit=dev
      - run: npm run build
      - name: Check production sourcemaps
        run: |
          if find build -name '*.map' -print | grep -q .; then
            echo "Production source maps were generated"
            exit 1
          fi

  backend:
    name: Backend dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip pip-audit
      - run: pip-audit -r backend-api/requirements.txt
      - run: pip-audit -r backend-lti/requirements.txt
      - run: pip-audit -r lti_tool/requirements.txt

  secrets:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml
